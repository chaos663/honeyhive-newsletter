<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | escape }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:site_name" content="{{ site.title }}">
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Font Preload for critical rendering -->
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" as="style">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" as="style">
  
  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  
  <!-- JetBrains Mono for code -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Pagefind Search -->
  <link href="{{ '/pagefind/pagefind-ui.css' | relative_url }}" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Dark mode: FOUC 방지 (렌더 전 테마 적용) -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  
  {% feed_meta %}
  {% seo %}
  
  <!-- Native lazy loading support script -->
  <script>
    // Add lazy loading to all images in post content
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.post-content img').forEach(function(img) {
        if (!img.hasAttribute('loading')) {
          img.setAttribute('loading', 'lazy');
          img.setAttribute('decoding', 'async');
        }
      });
    });
  </script>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-icon">🐝</span>
        <span class="logo-text">{{ site.title }}</span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="search-btn" class="search-btn" aria-label="검색 (⌘K)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <span class="search-shortcut">⌘K</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Search Modal -->
  <div id="search-modal" class="search-modal" aria-hidden="true">
    <div class="search-modal-backdrop"></div>
    <div class="search-modal-container">
      <div class="search-modal-header">
        <span class="search-modal-title">🔍 뉴스레터 검색</span>
        <button class="search-modal-close" aria-label="닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div id="search-container"></div>
    </div>
  </div>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. Curated with 🍯</p>
    </div>
  </footer>

  <!-- Theme Toggle Script -->
  <script>
    (function() {
      var toggle = document.getElementById('theme-toggle');
      if (!toggle) return;
      toggle.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
      // 시스템 설정 변경 감지 (수동 설정 없을 때만)
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
        }
      });
    })();
  </script>

  <!-- Mermaid.js for charts -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({ startOnLoad: true, theme: theme, securityLevel: 'loose' });
      }
    });
  </script>

  <!-- Pagefind Scripts -->
  <script src="{{ '/pagefind/pagefind-ui.js' | relative_url }}" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const searchBtn = document.getElementById('search-btn');
      const searchModal = document.getElementById('search-modal');
      const searchClose = searchModal.querySelector('.search-modal-close');
      const searchBackdrop = searchModal.querySelector('.search-modal-backdrop');
      let pagefindUI = null;

      function openSearch() {
        searchModal.classList.add('active');
        searchModal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        
        // Initialize Pagefind UI on first open
        if (!pagefindUI && typeof PagefindUI !== 'undefined') {
          pagefindUI = new PagefindUI({
            element: '#search-container',
            showSubResults: true,
            showImages: false,
            translations: {
              placeholder: '검색어를 입력하세요...',
              zero_results: '검색 결과가 없습니다',
              many_results: '[count]개의 결과',
              one_result: '1개의 결과',
              searching: '검색 중...'
            }
          });
        }
        
        // Focus search input
        setTimeout(() => {
          const input = searchModal.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      }

      function closeSearch() {
        searchModal.classList.remove('active');
        searchModal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      // Event listeners
      searchBtn.addEventListener('click', openSearch);
      searchClose.addEventListener('click', closeSearch);
      searchBackdrop.addEventListener('click', closeSearch);

      // Keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        // ⌘K or Ctrl+K to open
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          if (searchModal.classList.contains('active')) {
            closeSearch();
          } else {
            openSearch();
          }
        }
        // Escape to close
        if (e.key === 'Escape' && searchModal.classList.contains('active')) {
          closeSearch();
        }
      });
    });
  </script>
</body>
</html>
